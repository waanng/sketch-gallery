  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --transition: cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(250, 250, 250, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s var(--transition);
    }

    header.scrolled {
      border-color: var(--border);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 3rem;
    }

    nav a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s var(--transition);
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--text-primary);
      transition: width 0.3s var(--transition);
    }

    nav a:hover,
    nav a.active {
      color: var(--text-primary);
    }

    nav a:hover::after,
    nav a.active::after {
      width: 100%;
    }

    /* Main */
    main {
      padding-top: 80px;
    }

    /* Collection Header */
    .collection-header {
      max-width: 1400px;
      margin: 0 auto;
      padding: 6rem 3rem 2rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--text-primary);
    }

    .collection-header h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .collection-header p {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-secondary);
    }

    /* Gallery */
    .gallery {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 3rem 8rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 1/1;
      background: var(--bg-secondary);
      overflow: hidden;
      cursor: pointer;
      border-radius: 4px;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s var(--transition);
    }

    .gallery-item:hover img {
      transform: scale(1.03);
    }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s var(--transition);
      display: flex;
      align-items: flex-end;
      padding: 1.5rem;
    }

    .gallery-item:hover .gallery-item-overlay {
      opacity: 1;
    }

    .gallery-item-number {
      font-size: 0.875rem;
      font-weight: 500;
      color: #fff;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s var(--transition), visibility 0.4s;
    }

    .lightbox.active {
      opacity: 1;
      visibility: visible;
    }

    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
    }

    .lightbox-content img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      display: block;
    }

    .lightbox-close {
      position: absolute;
      top: -3rem;
      right: 0;
      font-size: 2rem;
      color: rgba(255,255,255,0.7);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .lightbox-close:hover {
      color: #fff;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: rgba(255,255,255,0.5);
      background: none;
      border: none;
      cursor: pointer;
      padding: 1rem;
      transition: color 0.2s;
    }

    .lightbox-nav:hover {
      color: #fff;
    }

    .lightbox-prev { left: -4rem; }
    .lightbox-next { right: -4rem; }

    /* Footer */
    footer {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .footer-right {
      display: flex;
      gap: 2rem;
    }

    .footer-right a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-right a:hover {
      color: var(--text-primary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-inner {
        padding: 1rem 1.5rem;
      }

      nav {
        gap: 1.5rem;
      }

      .collection-header {
        padding: 5rem 1.5rem 2rem;
      }

      .gallery {
        padding: 2rem 1.5rem 6rem;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1rem;
      }

      .lightbox-nav {
        display: none;
      }

      footer {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
        padding: 3rem 1.5rem;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .gallery-item {
      animation: fadeIn 0.6s ease backwards;
    }
  </style>

    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <button class="lightbox-nav lightbox-prev" onclick="changeImage(-1)">&#8249;</button>
    <button class="lightbox-nav lightbox-next" onclick="changeImage(1)">&#8250;</button>
    <div class="lightbox-content">
      <img src="" alt="" id="lightbox-img">
    </div>

  <script>
    // Header scroll effect
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });

    // Lightbox functionality
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const galleryItems = document.querySelectorAll('.gallery-item img');
    let currentImageIndex = 0;

    function openLightbox(index) {
      currentImageIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function changeImage(direction) {
      currentImageIndex += direction;
      if (currentImageIndex < 0) currentImageIndex = galleryItems.length - 1;
      if (currentImageIndex >= galleryItems.length) currentImageIndex = 0;
      updateLightbox();
    }

    function updateLightbox() {
      lightboxImg.src = galleryItems[currentImageIndex].src;
    }

    // Close lightbox on background click
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') changeImage(-1);
      if (e.key === 'ArrowRight') changeImage(1);
    });
  </script>
