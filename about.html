<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于 | 无形艺趣</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --transition: cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(250, 250, 250, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s var(--transition);
    }

    header.scrolled {
      border-color: var(--border);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 3rem;
    }

    nav a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s var(--transition);
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--text-primary);
      transition: width 0.3s var(--transition);
    }

    nav a:hover,
    nav a.active {
      color: var(--text-primary);
    }

    nav a:hover::after,
    nav a.active::after {
      width: 100%;
    }

    /* Main */
    main {
      padding-top: 80px;
    }

    /* About Section */
    .about {
      max-width: 800px;
      margin: 0 auto;
      padding: 8rem 3rem;
      text-align: center;
    }

    .about-image {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--border);
    }

    .about-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .about h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .about p {
      font-size: 1.125rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      line-height: 1.8;
    }

    .about-stats {
      display: flex;
      justify-content: center;
      gap: 4rem;
      margin-top: 4rem;
      padding-top: 3rem;
      border-top: 1px solid var(--border);
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
    }

    /* Contact */
    .contact {
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 3rem 8rem;
      text-align: center;
    }

    .contact h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .contact-links {
      display: flex;
      justify-content: center;
      gap: 3rem;
    }

    .contact-links a {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-links a:hover {
      color: var(--text-secondary);
    }

    /* Footer */
    footer {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .footer-right {
      display: flex;
      gap: 2rem;
    }

    .footer-right a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-right a:hover {
      color: var(--text-primary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-inner {
        padding: 1rem 1.5rem;
      }

      nav {
        gap: 1.5rem;
      }

      .about {
        padding: 6rem 1.5rem;
      }

      .about-image {
        width: 100px;
        height: 100px;
      }

      .about-stats {
        gap: 2rem;
      }

      .stat-number {
        font-size: 2rem;
      }

      .contact {
        padding: 3rem 1.5rem 6rem;
      }

      .contact-links {
        flex-direction: column;
        gap: 1rem;
      }

      footer {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
        padding: 3rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header id="header">
    <div class="header-inner">
      <a href="index.html" class="logo">无形艺趣</a>
      <nav>
        <a href="index.html">画册</a>
        <a href="about.html" class="active">关于</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="about">
      <div class="about-image">
        <img src="转角集/肖像.jpeg" alt="王安" loading="lazy">
      </div>
      <h1>王安</h1>
      <p>一个热爱速写的创作者，用画笔记录生活中的美好瞬间。</p>
      <p>多年来，坚持每天速写，将看到的风景、人物、建筑都记录在画册中。从「空杯集」到「转角集」再到「烟火集」、还有「自在集」，每一本画册都承载着那个时期的故事和心情。</p>
      
      <div class="about-stats">
        <div class="stat">
          <div class="stat-number">5+</div>
          <div class="stat-label">年创作</div>
        </div>
        <div class="stat">
          <div class="stat-number">4</div>
          <div class="stat-label">本画册</div>
        </div>
        <div class="stat">
          <div class="stat-number">57</div>
          <div class="stat-label">幅作品</div>
        </div>
      </div>
    </section>

    <section class="contact">
      <h2>联系我</h2>
      <div class="contact-links">
        <a href="mailto:wangan@shuce.top">Email</a>
        <a href="https://instagram.com/waanng" target="_blank">Instagram</a>
        <a href="#" onclick="alert('微信: waanng')" title="微信: waanng">WeChat</a>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-left">
      © 2026 Wang An
    </div>
    <div class="footer-right">
      <a href="mailto:wangan@shuce.top">Email</a>
      <a href="https://instagram.com/waanng" target="_blank">Instagram</a>
      <a href="#" onclick="alert('微信: waanng')" title="微信: waanng">WeChat</a>
    </div>
  </footer>

  <script>
    // Header scroll effect
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
