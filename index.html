<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无形艺趣 | Wang An</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --transition: cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(250, 250, 250, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s var(--transition);
    }

    header.scrolled {
      border-color: var(--border);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 3rem;
    }

    nav a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s var(--transition);
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--text-primary);
      transition: width 0.3s var(--transition);
    }

    nav a:hover,
    nav a.active {
      color: var(--text-primary);
    }

    nav a:hover::after,
    nav a.active::after {
      width: 100%;
    }

    /* Main */
    main {
      padding-top: 80px;
    }

    /* Hero Section */
    .hero {
      max-width: 1400px;
      margin: 0 auto;
      padding: 8rem 3rem 4rem;
    }

    .hero-content {
      max-width: 800px;
    }

    .hero h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    .hero p {
      font-size: 1.125rem;
      font-weight: 400;
      color: var(--text-secondary);
      max-width: 600px;
      line-height: 1.8;
    }

    /* Collections Grid */
    .collections {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 3rem 8rem;
    }

    .collections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 3rem;
    }

    .collection-card {
      position: relative;
      background: var(--bg-secondary);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.4s var(--transition), box-shadow 0.4s var(--transition);
      text-decoration: none;
      color: inherit;
    }

    .collection-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .collection-cover {
      aspect-ratio: 1/1;
      overflow: hidden;
    }

    .collection-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s var(--transition);
    }

    .collection-card:hover .collection-cover img {
      transform: scale(1.05);
    }

    .collection-info {
      padding: 2rem;
    }

    .collection-info h2 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .collection-info p {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }

    .collection-count {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Footer */
    footer {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .footer-right {
      display: flex;
      gap: 2rem;
    }

    .footer-right a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-right a:hover {
      color: var(--text-primary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-inner {
        padding: 1rem 1.5rem;
      }

      nav {
        gap: 1.5rem;
      }

      .hero {
        padding: 6rem 1.5rem 3rem;
      }

      .collections {
        padding: 2rem 1.5rem 6rem;
      }

      .collections-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      footer {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
        padding: 3rem 1.5rem;
      }
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .collection-card {
      animation: fadeInUp 0.6s ease backwards;
    }

    .collection-card:nth-child(1) { animation-delay: 0.1s; }
    .collection-card:nth-child(2) { animation-delay: 0.2s; }
    .collection-card:nth-child(3) { animation-delay: 0.3s; }
  </style>
</head>
<body>
  <header id="header">
    <div class="header-inner">
      <a href="index.html" class="logo">无形艺趣</a>
      <nav>
        <a href="index.html" class="active">画册</a>
        <a href="about.html">关于</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">

    <section class="collections">
      <div class="collections-grid">
        <a href="empty-cup.html" class="collection-card">
          <div class="collection-cover">
            <img src="空杯集/植物园.jpeg" alt="空杯集" loading="lazy">
          </div>

            <span class="collection-count">15 幅作品</span>

        <a href="corner.html" class="collection-card">
          <div class="collection-cover">

          </div>
        </a>

        <a href="fire.html" class="collection-card">
          <div class="collection-cover">
            <img src="烟火集/IMG_20220421_121808-01.jpeg" alt="烟火集" loading="lazy">
          </div>
          <div class="collection-info">
            <h2>烟火集</h2>

            <span class="collection-count">18 幅作品</span>
          </div>

        <a href="free.html" class="collection-card">
          <div class="collection-cover">
            <img src="自在集/1730866310477.jpg" alt="自在集" loading="lazy">
          </div>
          <div class="collection-info">
            <h2>自在集</h2>
            <p>2023</p>
            <span class="collection-count">9 幅作品</span>
          </div>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-left">
      © 2026 Wang An
    </div>
    <div class="footer-right">
      <a href="mailto:wangan@shuce.top">Email</a>
      <a href="https://instagram.com/waanng" target="_blank">Instagram</a>
      <a href="#" onclick="alert('微信: waanng')" title="微信: waanng">WeChat</a>
    </div>
  </footer>

  <script>
    // Header scroll effect
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
